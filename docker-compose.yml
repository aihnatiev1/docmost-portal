services:
  docmost:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      APP_URL: 'http://localhost:3456'
      APP_SECRET: 'c4bc1b6f039bc5ab1b2d13370aa7f3c055a350a6e2f27b5ac5c1b0eb2b7addf8'
      DATABASE_URL: 'postgresql://docmost:docmost_pass_2026@db:5432/docmost'
      REDIS_URL: 'redis://redis:6379'
    ports:
      - "3456:3000"
    restart: unless-stopped
    volumes:
      - docmost:/app/data/storage

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: docmost_pass_2026
    restart: unless-stopped
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

volumes:
  docmost:
  db_data:
  redis_data:
